<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Save Opacity State</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: blue;
            opacity: 0.5;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div class="box" id="myBox"></div>

    <script>
        const box = document.getElementById('myBox');

        // Функция для восстановления состояния opacity из localStorage
        function restoreOpacityState() {
            const savedOpacity = localStorage.getItem('boxOpacity');
            if (savedOpacity !== null) {
                console.log(`Restoring opacity: ${savedOpacity}`);
                box.style.opacity = savedOpacity;
            } else {
                console.log('No saved opacity found, using default.');
            }
        }

        // Функция для сохранения состояния opacity в localStorage
        function saveOpacityState(value) {
            console.log(`Saving opacity: ${value}`);
            localStorage.setItem('boxOpacity', value);
        }

        // Восстанавливаем состояние opacity при загрузке страницы
        document.addEventListener('DOMContentLoaded', restoreOpacityState);

        // Изменение opacity при клике и сохранение нового состояния
        box.addEventListener('click', () => {
            const newOpacity = box.style.opacity === '1' ? '0.5' : '1';
            box.style.opacity = newOpacity;
            saveOpacityState(newOpacity);
        });
    </script>
</body>
</html>
