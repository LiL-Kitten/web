<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Исходная фигура круга -->
  <defs>
    <mask id="moonMask">
      <!-- Полный круг где белое пространство будет луна -->
      <circle cx="100" cy="100" r="60" fill="rgb(119, 119, 119)"/> 
      <!-- сохранить разницу по х в 30 и по у в 10 -->
      <!-- Прозрачный круг, чтобы создать затемнение для луны -->
      <circle cx="130" cy="90" r="50" fill="black" />
    </mask>
  </defs>
  
  <!-- Закругленные углы вокруг всего SVG, если нужно -->
  <rect width="200" height="200" rx="30" ry="30" fill="none" stroke="none" />
  
  <!-- Луна с закругленными углами -->
  <rect x="0" y="0" width="200" height="200" fill="#000" mask="url(#moonMask)" />
</svg>
